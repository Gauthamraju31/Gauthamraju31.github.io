    <!-- Register coi-serviceworker on GitHub Pages (where server headers can't be set).
         On Firebase, crossOriginIsolated is already true thanks to firebase.json headers,
         so this block is completely skipped there. -->
    <script>
        if (!crossOriginIsolated && 'serviceWorker' in navigator) {
            navigator.serviceWorker.register('/coi-serviceworker.js').then(reg => {
                if (!reg.active) {
                    reg.addEventListener('updatefound', () => {
                        reg.installing.addEventListener('statechange', e => {
                            if (e.target.state === 'activated') location.reload()
                        })
                    })
                }
            })
        }
    </script>
